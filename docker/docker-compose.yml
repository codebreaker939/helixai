services:

  postgres:
    image: postgres:16

    container_name: helixai-postgres

    environment:
      POSTGRES_DB: helixai_db
      POSTGRES_USER: helixai
      POSTGRES_PASSWORD: helixai123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixai -d helixai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../app

    container_name: helixai-api

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${API_PORT:-8000}:8000"

    environment:
      DATABASE_URL: postgresql://helixai:helixai123@postgres:5432/helixai_db
      HELIXAI_ENVIRONMENT: local
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      LOKI_URL: http://loki:3100/ready
      VAULT_URL: http://vault:8200
      JENKINS_URL: http://jenkins:8080
      JENKINS_JOB: helixai
      JENKINS_USERNAME: ${JENKINS_USERNAME:-}
      JENKINS_API_TOKEN: ${JENKINS_API_TOKEN:-}
      KUBECONFIG: /root/.kube/config
      KUBERNETES_HOST_OVERRIDE: host.docker.internal
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

    volumes:
      - ${HOME}/.kube/config:/root/.kube/config:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../frontend
      args:
        VITE_GRAFANA_URL: http://localhost:${GRAFANA_PORT:-3001}
        VITE_PROMETHEUS_URL: http://localhost:${PROMETHEUS_PORT:-9091}
        VITE_JENKINS_PUBLIC_URL: http://localhost:${JENKINS_PORT:-8081}
        VITE_VAULT_URL: http://localhost:${VAULT_PORT:-8200}

    container_name: helixai-frontend

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-3000}:80"

  prometheus:
    image: prom/prometheus:v3.7.3

    container_name: helixai-prometheus

    profiles:
      - dashboards

    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"

    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  promtail:
    image: grafana/promtail:3.5.8

    container_name: helixai-promtail

    profiles:
      - dashboards

    depends_on:
      - loki

    volumes:
      - ../logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    command: ["-config.file=/etc/promtail/config.yml"]

  grafana:
    image: grafana/grafana:12.3.0

    container_name: helixai-grafana

    profiles:
      - dashboards

    depends_on:
      - prometheus
      - loki

    ports:
      - "${GRAFANA_PORT:-3001}:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.5.8

    container_name: helixai-loki

    profiles:
      - dashboards

    ports:
      - "${LOKI_PORT:-3100}:3100"

    volumes:
      - ../logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

    command: ["-config.file=/etc/loki/local-config.yaml"]

  vault:
    image: hashicorp/vault:1.21.1

    container_name: helixai-vault

    profiles:
      - dashboards

    ports:
      - "${VAULT_PORT:-8200}:8200"

    cap_add:
      - IPC_LOCK

    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

  vault-init:
    image: hashicorp/vault:1.21.1

    container_name: helixai-vault-init

    profiles:
      - dashboards

    depends_on:
      - vault

    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

    command:
      - sh
      - -c
      - |
        until vault status >/dev/null 2>&1; do sleep 2; done
        vault kv put secret/helixai/database username=helixai password=helixai123 database=helixai_db host=postgres port=5432
        vault kv put secret/helixai/api service=helixai-api health_url=http://api:8000/health docs_url=http://api:8000/docs
        vault kv put secret/helixai/monitoring grafana=http://grafana:3000 prometheus=http://prometheus:9090 loki=http://loki:3100

  jenkins:
    build:
      context: ./jenkins

    container_name: helixai-jenkins

    profiles:
      - dashboards

    ports:
      - "${JENKINS_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace/helixai:ro

  adminer:
    image: adminer:5.4.1

    container_name: helixai-adminer

    profiles:
      - dashboards

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${ADMINER_PORT:-8082}:8080"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  jenkins_home:
