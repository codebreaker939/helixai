services:

  postgres:
    image: postgres:16

    container_name: helixai-postgres

    environment:
      POSTGRES_DB: helixai_db
      POSTGRES_USER: helixai
      POSTGRES_PASSWORD: helixai123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixai -d helixai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../app

    container_name: helixai-api

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${API_PORT:-8000}:8000"

    environment:
      DATABASE_URL: postgresql://helixai:helixai123@postgres:5432/helixai_db

  prometheus:
    image: prom/prometheus:v3.7.3

    container_name: helixai-prometheus

    profiles:
      - dashboards

    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"

    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:12.3.0

    container_name: helixai-grafana

    profiles:
      - dashboards

    depends_on:
      - prometheus
      - loki

    ports:
      - "${GRAFANA_PORT:-3001}:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  loki:
    image: grafana/loki:3.5.8

    container_name: helixai-loki

    profiles:
      - dashboards

    ports:
      - "${LOKI_PORT:-3100}:3100"

    volumes:
      - ../logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

    command: ["-config.file=/etc/loki/local-config.yaml"]

  vault:
    image: hashicorp/vault:1.21.1

    container_name: helixai-vault

    profiles:
      - dashboards

    ports:
      - "${VAULT_PORT:-8200}:8200"

    cap_add:
      - IPC_LOCK

    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

  jenkins:
    image: jenkins/jenkins:lts-jdk17

    container_name: helixai-jenkins

    profiles:
      - dashboards

    ports:
      - "${JENKINS_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"

    volumes:
      - jenkins_home:/var/jenkins_home

  adminer:
    image: adminer:5.4.1

    container_name: helixai-adminer

    profiles:
      - dashboards

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${ADMINER_PORT:-8082}:8080"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  jenkins_home:
