services:

  postgres:
    image: postgres:16

    container_name: helixai-postgres

    environment:
      POSTGRES_DB: helixai_db
      POSTGRES_USER: helixai
      POSTGRES_PASSWORD: helixai123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixai -d helixai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../app

    container_name: helixai-api

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://helixai:helixai123@postgres:5432/helixai_db

volumes:
  postgres_data: