name: HelixAI DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install PyYAML

      - name: Compile Python sources
        run: python -m py_compile app/main.py app/database.py app/models.py app/test_db.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Validate Docker Compose configuration
        run: docker compose -f docker/docker-compose.yml config

      - name: Build and start local stack
        run: docker compose -f docker/docker-compose.yml up --build -d

      - name: Smoke test API and database
        run: |
          set -euo pipefail
          trap 'docker compose -f docker/docker-compose.yml ps; docker compose -f docker/docker-compose.yml logs --no-color --tail=120' ERR

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi

            sleep 2
          done

          docker compose -f docker/docker-compose.yml ps
          curl --fail --silent --show-error http://127.0.0.1:8000/
          curl --fail -X POST http://127.0.0.1:8000/patients \
            -H 'Content-Type: application/json' \
            -d '{"full_name":"GitHub Pipeline Smoke Test","age":42,"gender":"test","disease":"integration"}'
          curl --fail --silent --show-error http://127.0.0.1:8000/patients

      - name: Stop local stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

      - name: Validate Kubernetes manifests
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          manifests = sorted(Path("k8s").glob("*.yaml"))
          if not manifests:
              raise SystemExit("No Kubernetes manifests found")

          for manifest in manifests:
              docs = list(yaml.safe_load_all(manifest.read_text()))
              if not docs:
                  raise SystemExit(f"{manifest} contains no YAML documents")

              for index, doc in enumerate(docs, start=1):
                  if doc is None:
                      continue
                  if not isinstance(doc, dict):
                      raise SystemExit(f"{manifest} document {index} is not a mapping")

                  for key in ("apiVersion", "kind", "metadata"):
                      if key not in doc:
                          raise SystemExit(f"{manifest} document {index} missing {key}")

                  metadata = doc["metadata"]
                  if not isinstance(metadata, dict) or not metadata.get("name"):
                      raise SystemExit(f"{manifest} document {index} missing metadata.name")

                  print(f"{manifest}: {doc['kind']}/{metadata['name']}")
          PY

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform -chdir=terraform fmt -check -diff

      - name: Initialize Terraform
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=terraform validate

      - name: Simulate Jenkins Docker build stage
        run: |
          docker build -t helixai-api:v1 ./app
          docker build -t helixai-frontend:v1 ./frontend
