name: HelixAI DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Compile Python sources
        run: python -m py_compile app/main.py app/database.py app/models.py app/test_db.py

      - name: Validate Docker Compose configuration
        run: docker compose -f docker/docker-compose.yml config

      - name: Build and start local stack
        run: docker compose -f docker/docker-compose.yml up --build -d

      - name: Smoke test API and database
        run: |
          curl --fail --retry 20 --retry-delay 3 --retry-connrefused http://127.0.0.1:8000/health
          curl --fail http://127.0.0.1:8000/
          curl --fail -X POST http://127.0.0.1:8000/patients \
            -H 'Content-Type: application/json' \
            -d '{"full_name":"GitHub Pipeline Smoke Test","age":42,"gender":"test","disease":"integration"}'
          curl --fail http://127.0.0.1:8000/patients

      - name: Stop local stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl create --dry-run=client --validate=false -f k8s -o yaml

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform -chdir=terraform fmt -check -diff

      - name: Initialize Terraform
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=terraform validate

      - name: Simulate Jenkins Docker build stage
        run: docker build -t helixai-api:v1 ./app
