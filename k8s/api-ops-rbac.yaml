apiVersion: v1
kind: ServiceAccount
metadata:
  name: helixai-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helixai-api-observer
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helixai-api-observer
subjects:
  - kind: ServiceAccount
    name: helixai-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: helixai-api-observer
