apiVersion: apps/v1
kind: Deployment
metadata:
  name: helixai-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helixai-api
  template:
    metadata:
      labels:
        app: helixai-api
    spec:
      containers:
        - name: helixai-api
          image: helixai-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helixai-secret
                  key: DATABASE_URL
            