apiVersion: apps/v1
kind: Deployment
metadata:
  name: helixai-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helixai-postgres
  template:
    metadata:
      labels:
        app: helixai-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: helixai-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: helixai-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helixai-secret
                  key: POSTGRES_PASSWORD
            