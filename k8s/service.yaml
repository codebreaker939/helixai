apiVersion: v1
kind: Service
metadata:
  name: helixai-postgres-service
spec:
  selector:
    app: helixai-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: helixai-api-service
spec:
  type: NodePort
  selector:
    app: helixai-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080