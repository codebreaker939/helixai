apiVersion: apps/v1
kind: Deployment
metadata:
  name: helixai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helixai-frontend
  template:
    metadata:
      labels:
        app: helixai-frontend
    spec:
      containers:
        - name: helixai-frontend
          image: helixai-frontend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /frontend-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /frontend-health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: helixai-frontend-service
spec:
  type: NodePort
  selector:
    app: helixai-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
